{% extends 'main/base.html' %}
{% load static %}

{% block content %}
<div class="container">
    <div class="row align-items-center min-vh-100 py-5">
        <div class="col-lg-6 animate__animated animate__fadeInLeft">
            <h1 class="display-3 fw-bold mb-4" style="color: var(--primary-green);">
                Planteer <br>
                <span style="color: #4A7C44;">Your Green Soul</span>
            </h1>
            <p class="lead text-muted mb-5">
                اكتشف عالم النباتات الساحر. ابحث عن فصيلتك المفضلة، تعلم كيفية العناية بها، وشاركنا شغفك باللون الأخضر.
            </p>

            <form action="{% url 'plants:search_view' %}" method="GET" class="search-container mb-4">
                <input type="text" name="search" class="search-input" placeholder="ابحث عن نباتك القادم...">
                <button type="submit" class="btn-main">بحث</button>
            </form>
        </div>

        <div class="col-lg-6 animate__animated animate__fadeInRight">
            <div class="position-relative">
                <img src="https://images.unsplash.com/photo-1545241047-6083a3684587?q=80&w=1000" 
                     alt="Plant" class="img-fluid rounded-circle shadow-lg" 
                     style="width: 500px; height: 500px; object-fit: cover; border: 15px solid var(--light-sage);">
            </div>
        </div>
    </div>

    <div class="py-5">
        <div class="d-flex justify-content-between align-items-end mb-5">
            <div>
                <h2 class="fw-bold">نباتات مختارة</h2>
                <div style="width: 50px; height: 4px; background: var(--primary-green);"></div>
            </div>
            <a href="{% url 'plants:all_plants_view' %}" class="btn btn-link text-decoration-none text-success">عرض الكل ←</a>
        </div>

        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="plant-card p-3">
                    <img src="" class="img-fluid rounded-4 mb-3">
                    <h5 class="fw-bold"> <h5>
                    <p class="text-muted small">  </p>
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="badge bg-success bg-opacity-10 text-success p-2">نبات زينة</span>
                        <a href="#" class="btn-main py-1 px-3" style="font-size: 0.8rem;">التفاصيل</a>
                    </div>
                </div>
            </div>
            </div>
    </div>
</div>
{% endblock %}
