{% extends 'main/base.html' %}

{% block title %} الحساب {% endblock %}

{% block content %}
<style>
    .auth-card {
        max-width: 450px;
        margin: 60px auto;
        padding: 30px;
        border-radius: 15px;
        background: #fff;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        direction: rtl;
    }
    .nav-tabs .nav-link.active {
        color: #2d5a27;
        border-bottom: 3px solid #2d5a27;
        font-weight: bold;
    }
    .btn-auth {
        background-color: #2d5a27;
        color: white;
        border-radius: 10px;
        padding: 10px;
        width: 100%;
        margin-top: 20px;
    }
</style>

<div class="container">
    <div class="auth-card">
        <ul class="nav nav-tabs nav-fill mb-4" id="authTab" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button">تسجيل دخول</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button">مستخدم جديد</button>
            </li>
        </ul>

        <div class="tab-content" id="authTabContent">
            <div class="tab-pane fade show active" id="login" role="tabpanel">
                <form action="{% url 'accounts:login_view' %}" method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">اسم المستخدم</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">كلمة المرور</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn-auth btn">دخول</button>
                </form>
            </div>

            <div class="tab-pane fade" id="register" role="tabpanel">
                <form action="{% url 'accounts:register_view' %}" method="POST">
                    {% csrf_token %}
                    {% for field in register_form %}
                        <div class="mb-3 text-end">
                            <label class="form-label">{{ field.label }}</label>
                            {{ field }}
                            {% if field.help_text %}
                                <small class="text-muted d-block">{{ field.help_text }}</small>
                            {% endif %}
                        </div>
                    {% endfor %}
                    <button type="submit" class="btn-auth btn">إنشاء الحساب</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
