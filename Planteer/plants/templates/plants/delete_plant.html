{% extends 'main/base.html' %}

{% block content %}
<div class="container mt-3 d-flex justify-content-end">
    <a href="javascript:history.back()" class="btn btn-outline-success rounded-pill px-4 fw-bold">
        <i class="fas fa-arrow-left me-2"></i> رجوع
    </a>
</div>
<div class="container py-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-lg p-5 animate__animated animate__shakeX" style="border-radius: 30px;">
                <div class="text-danger mb-4">
                    <i class="fas fa-exclamation-triangle fa-4 drop-shadow"></i>
                </div>
                <h2 class="fw-bold mb-3">هل أنتِ متأكدة؟</h2>
                <p class="text-muted mb-5">أنتِ على وشك حذف <strong>"{{ plant.name }}"</strong> نهائياً من المكتبة. لا
                    يمكن التراجع عن هذا الإجراء.</p>

                <form action="{% url 'plants:delete_plant_view' plant.id %}" method="POST">
                    {% csrf_token %}
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-danger rounded-pill py-3 fw-bold">نعم، احذفه الآن</button>
                        <a href="{% url 'plants:plant_detail_view' plant.id %}"
                            class="btn btn-light rounded-pill py-3">إلغاء، العودة للتفاصيل</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<style>
    .btn-back-custom {
    color: #2D5A27; 
    border: 1px solid #2D5A27;
    border-radius: 50px; 
    padding: 8px 25px;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.3s ease;
    display: inline-flex;
    align-items: center;
    gap: 8px;
}

.btn-back-custom:hover {
    background-color: #2D5A27;
    color: white;
    transform: translateX(-5px);
}
</style>
{% endblock %}
