{% extends 'main/base.html' %}

{% block content %}
<div class="container py-5 animate__animated animate__fadeIn">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card border-0 shadow-lg p-5" style="border-radius: 25px;">
                <h2 class="fw-bold mb-4" style="color: var(--primary-green);">تعديل بيانات: {{ plant.name }}</h2>
                
                <form action="{% url 'plants:update_plant_view' plant.id %}" method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label class="form-label fw-bold">اسم النبات</label>
                        <input type="text" name="name" class="form-control custom-input" value="{{ plant.name }}" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label class="form-label fw-bold">الفئة</label>
                            <select name="category" class="form-select custom-input">
                                <option value="Tree" {% if plant.category == 'Tree' %}selected{% endif %}>شجرة</option>
                                <option value="Fruit" {% if plant.category == 'Fruit' %}selected{% endif %}>فاكهة</option>
                                <option value="Vegetable" {% if plant.category == 'Vegetable' %}selected{% endif %}>خضروات</option>
                                <option value="Flower" {% if plant.category == 'Flower' %}selected{% endif %}>وردة</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-4 d-flex align-items-center pt-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" name="is_edible" id="edibleSwitch" {% if plant.is_edible %}checked{% endif %}>
                                <label class="form-check-label fw-bold" for="edibleSwitch">هل هو صالح للأكل؟</label>
                            </div>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">تغيير الصورة (اختياري)</label>
                        <input type="file" name="image" class="form-control custom-input">
                        <small class="text-muted">اتركها فارغة إذا لم ترد تغيير الصورة الحالية.</small>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">وصف النبات</label>
                        <textarea name="description" class="form-control custom-input" rows="5" required>{{ plant.description }}</textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn-main flex-grow-1">حفظ التغييرات</button>
                        <a href="{% url 'plants:plant_detail_view' plant.id %}" class="btn btn-outline-secondary rounded-pill px-4">إلغاء</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
